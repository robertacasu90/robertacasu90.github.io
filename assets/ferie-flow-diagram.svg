<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Inter, 'Segoe UI', sans-serif" role="img" aria-label="Diagramma architetturale del flusso di richiesta e approvazione ferie">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&amp;family=Inter:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap');
    .title    { font-family: Fraunces, Georgia, serif; font-size: 30px; font-weight: 600; fill: #6B2C39; }
    .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 13px; fill: #B08D57; letter-spacing: .04em; }
    .box      { fill: #FDFBF9; stroke: #6B2C39; stroke-width: 1.5; }
    .box-out  { fill: #F5EDE8; stroke: #B08D57; stroke-width: 1.5; }
    .box-title{ font-size: 16px; font-weight: 600; fill: #6B2C39; }
    .box-sub  { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; fill: #8A5A63; }
    .box-desc { font-size: 12.5px; fill: #4A3238; }
    .edge     { stroke: #B08D57; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    .edge-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #6B2C39; }
    .stepnum  { font-size: 13px; font-weight: 600; fill: #F5EDE8; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B08D57"/>
    </marker>
  </defs>

  <rect width="960" height="640" fill="#F5EDE8"/>

  <!-- Titolo -->
  <text x="48" y="56" class="title">Flusso di approvazione ferie</text>
  <text x="48" y="82" class="subtitle">POWER APPS · POWER AUTOMATE · DATAVERSE · TEAMS</text>
  <line x1="48" y1="98" x2="912" y2="98" stroke="#B08D57" stroke-width="1" opacity="0.5"/>

  <!-- Riga 1 -->
  <g>
    <rect x="48" y="140" width="180" height="96" rx="10" class="box"/>
    <circle cx="70" cy="162" r="11" fill="#6B2C39"/><text x="70" y="167" text-anchor="middle" class="stepnum">1</text>
    <text x="90" y="167" class="box-title">Dipendente</text>
    <text x="66" y="192" class="box-desc">Compila la richiesta:</text>
    <text x="66" y="209" class="box-desc">date, tipo assenza, note</text>
  </g>

  <g>
    <rect x="300" y="140" width="240" height="96" rx="10" class="box"/>
    <circle cx="322" cy="162" r="11" fill="#6B2C39"/><text x="322" y="167" text-anchor="middle" class="stepnum">2</text>
    <text x="342" y="167" class="box-title">Power App</text>
    <text x="318" y="190" class="box-sub">canvas app · mobile e desktop</text>
    <text x="318" y="211" class="box-desc">Form di richiesta con validazione</text>
  </g>

  <g>
    <rect x="612" y="140" width="240" height="96" rx="10" class="box"/>
    <circle cx="634" cy="162" r="11" fill="#6B2C39"/><text x="634" y="167" text-anchor="middle" class="stepnum">3</text>
    <text x="654" y="167" class="box-title">Dataverse</text>
    <text x="630" y="190" class="box-sub">tabella «Richieste ferie»</text>
    <text x="630" y="211" class="box-desc">Nuova riga, stato «In attesa»</text>
  </g>

  <!-- Frecce riga 1 -->
  <path d="M 228 188 H 292" class="edge"/>
  <text x="236" y="180" class="edge-lbl">apre l'app</text>
  <path d="M 540 188 H 604" class="edge"/>
  <text x="548" y="180" class="edge-lbl">salva</text>

  <!-- Discesa Dataverse → Power Automate -->
  <path d="M 732 236 V 296" class="edge"/>
  <text x="744" y="272" class="edge-lbl">trigger: riga creata</text>

  <!-- Riga 2 -->
  <g>
    <rect x="612" y="304" width="240" height="96" rx="10" class="box"/>
    <circle cx="634" cy="326" r="11" fill="#6B2C39"/><text x="634" y="331" text-anchor="middle" class="stepnum">4</text>
    <text x="654" y="331" class="box-title">Power Automate</text>
    <text x="630" y="354" class="box-sub">flusso automatizzato</text>
    <text x="630" y="375" class="box-desc">Avvia l'azione «Approvals» e</text>
    <text x="630" y="391" class="box-desc">instrada al responsabile</text>
  </g>

  <g>
    <rect x="300" y="304" width="240" height="96" rx="10" class="box"/>
    <circle cx="322" cy="326" r="11" fill="#6B2C39"/><text x="322" y="331" text-anchor="middle" class="stepnum">5</text>
    <text x="342" y="331" class="box-title">Responsabile</text>
    <text x="318" y="354" class="box-sub">approvazione in Teams</text>
    <text x="318" y="375" class="box-desc">Riceve la card, approva o</text>
    <text x="318" y="391" class="box-desc">rifiuta con commento</text>
  </g>

  <path d="M 604 352 H 548" class="edge"/>
  <text x="576" y="342" class="edge-lbl" text-anchor="middle">inoltra</text>

  <!-- Branch esito -->
  <path d="M 420 400 V 436 H 240 V 472" class="edge"/>
  <path d="M 420 400 V 436 H 640 V 472" class="edge"/>
  <text x="430" y="428" class="edge-lbl">esito</text>

  <!-- Riga 3: esiti -->
  <g>
    <rect x="120" y="480" width="240" height="104" rx="10" class="box-out"/>
    <text x="142" y="510" class="box-title">✓ Approvata</text>
    <text x="142" y="533" class="box-desc">Stato aggiornato in Dataverse,</text>
    <text x="142" y="549" class="box-desc">notifica Teams al dipendente,</text>
    <text x="142" y="565" class="box-desc">ferie registrate a calendario</text>
  </g>

  <g>
    <rect x="520" y="480" width="240" height="104" rx="10" class="box-out"/>
    <text x="542" y="510" class="box-title">✕ Rifiutata</text>
    <text x="542" y="533" class="box-desc">Stato aggiornato in Dataverse,</text>
    <text x="542" y="549" class="box-desc">notifica Teams con la</text>
    <text x="542" y="565" class="box-desc">motivazione del responsabile</text>
  </g>

  <text x="48" y="620" class="subtitle">ROBERTA CASU · ARCHITETTURA DEL PROGETTO — FASE DIMOSTRATIVA</text>
</svg>
